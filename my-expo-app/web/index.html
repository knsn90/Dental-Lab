<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Dental Lab</title>
    <style id="expo-reset">
      html, body { height: 100%; }
      body { overflow: hidden; }
      #root { display: flex; height: 100%; flex: 1; }
    </style>

    <!-- ── Google Fonts preconnect ──────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ── Outfit (metin fontu) ──────────────────────────────────────── -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- ── MaterialCommunityIcons (ikon fontu — expo-font tarafından da yüklenir) -->
    <style>
      @font-face {
        font-family: 'Material Design Icons';
        src: url('https://cdn.jsdelivr.net/npm/@expo/vector-icons@14.0.4/build/vendor/react-native-vector-icons/Fonts/MaterialCommunityIcons.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: block;
      }
    </style>

    <!-- ── Temel tipografi ────────────────────────────────────────────── -->
    <style>
      /* Outfit: HTML metin elementleri + RN <Text> → <div dir="auto"> */
      html, body,
      input, textarea, select, button, label, a {
        font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      }
      /* !important KULLANMA — ikon fontlarının inline fontFamily'si ezerek çalışır */
      [dir="auto"]:not([aria-hidden="true"]):not([role="img"]) {
        font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      }
    </style>

    %%EXPO_HEAD%%
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    %%EXPO_BUNDLE%%
  </body>
</html>
